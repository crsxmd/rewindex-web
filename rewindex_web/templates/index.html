<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewindex Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rubik:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<button id="menu-toggle" class="menu-toggle" onclick="toggleSidebar()">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
</button>

<div id="app">
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg width="20" height="20" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0">
                  <rect x="19" y="18" width="62" height="14" rx="4" fill="#2563EB"/>
                  <rect x="9"  y="43" width="82" height="14" rx="5" fill="#F43F5E"/>
                  <rect x="19" y="68" width="62" height="14" rx="4" fill="#F59E0B"/>
                </svg>
                <span class="logo-text">Rewindex</span>
            </div>
        </div>

        <nav id="nav">
            <a href="#overview" class="nav-item active" data-page="overview">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
                <span>Overview</span>
            </a>
            <a href="#files" class="nav-item" data-page="files">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="1.5"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span>Files</span>
            </a>
            <a href="#timeline" class="nav-item" data-page="timeline">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span>Timeline</span>
            </a>
            <a href="#projects" class="nav-item" data-page="projects">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke="currentColor" stroke-width="1.5"/></svg>
                <span>Projects</span>
            </a>
            <a href="#settings" class="nav-item" data-page="settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.5"/></svg>
                <span>Settings</span>
            </a>
            <a href="#license" class="nav-item" data-page="license">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" stroke="currentColor" stroke-width="1.5"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>License</span>
            </a>
            <a href="#update" class="nav-item" data-page="update">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2v6M12 2l-3 3M12 2l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 12a8 8 0 11-16 0 8 8 0 0116 0z" stroke="currentColor" stroke-width="1.5"/></svg>
                <span>Updates</span><span id="update-badge" class="nav-badge hidden"></span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="theme-toggle" onclick="toggleTheme()">
                <span id="theme-label">Dark mode</span>
                <div class="theme-switch"></div>
            </div>
            <div class="refresh-setting">
                <span class="refresh-label">Live updates</span>
                <select id="poll-select" class="project-select" onchange="setPollInterval(this.value)">
                    <option value="1">On</option>
                    <option value="0">Off</option>
                </select>
            </div>
            <div class="refresh-setting">
                <span class="refresh-label">Timezone</span>
                <select id="tz-select" class="project-select" onchange="setTimezone(this.value)"></select>
            </div>
            <div id="daemon-badge" class="daemon-badge">
                <span class="daemon-dot offline"></span>
                <span id="daemon-text">Checking...</span>
            </div>
            <select id="project-select" class="project-select">
                <option value="">No project</option>
            </select>
        </div>
    </aside>

    <main id="main">
        <div id="page-content" class="page-content">
            <div class="loading-state">Loading...</div>
        </div>
    </main>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-title"></h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
        <div id="modal-footer" class="modal-footer"></div>
    </div>
</div>

<!-- Toast -->
<div id="toast-container" class="toast-container"></div>

<script src="/static/app.js"></script>
</body>
</html>
